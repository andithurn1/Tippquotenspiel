<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" width="220" height="260" role="img" aria-label="Quotentippspiel Logo">
  <!--
    QT / Quotentippspiel — Logo-Entwurf v1
    Wappen-Frame (Sevilla-Stil: oben gerundet, unten spitz), Fußball im
    unteren Teil, Schriftzug oben im Rahmen.
    · Farben austauschbar: --frame (Gold) fürs Fanfarben-Theming, --field (Ink) als Fläche.
    · Schriftzug unten im <textPath> editierbar (Name ist noch nicht final).
    · Für den finalen Einsatz Schrift in Pfade umwandeln (Designer/Illustrator).
  -->
  <defs>
    <path id="topArc" d="M 60 70 C 84 56 136 56 160 70" fill="none"/>
    <style>
      :root { --frame:#F5C451; --field:#12172E; --ink:#0B0E1F; --ball:#EDEEF6; }
    </style>
  </defs>

  <!-- Äußerer Wappen-Rahmen (Gold) -->
  <path fill="#F5C451" d="
    M 40 60
    C 40 42 48 34 64 31
    C 80 28 96 27 110 27
    C 124 27 140 28 156 31
    C 172 34 180 42 180 60
    L 180 140
    C 180 190 148 228 110 246
    C 72 228 40 190 40 140
    Z"/>

  <!-- Innere Fläche (Ink) -->
  <path fill="#12172E" d="
    M 51 63
    C 51 49 58 43 71 40.5
    C 85 38 98 37 110 37
    C 122 37 135 38 149 40.5
    C 162 43 169 49 169 63
    L 169 137
    C 169 182 141 214 110 231
    C 79 214 51 182 51 137
    Z"/>

  <!-- Dünne Gold-Innenlinie (Doppelrahmen-Look) -->
  <path fill="none" stroke="#F5C451" stroke-width="1.6" opacity="0.55" d="
    M 57 65
    C 57 53 63 48 74 46
    C 87 44 99 43 110 43
    C 121 43 133 44 146 46
    C 157 48 163 53 163 65
    L 163 135
    C 163 176 138 206 110 221
    C 82 206 57 176 57 135
    Z"/>

  <!-- Schriftzug oben im Rahmen (Name editierbar) -->
  <text fill="#F5C451" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="12.5" letter-spacing="0.4" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">QUOTENTIPPSPIEL</textPath>
  </text>

  <!-- Fußball, unterer Teil, Richtung Spitze -->
  <g>
    <circle cx="110" cy="152" r="37" fill="#EDEEF6"/>
    <!-- zentrales Fünfeck -->
    <path fill="#0B0E1F" d="M 110 139 L 122.4 148 L 117.6 162.5 L 102.4 162.5 L 97.6 148 Z"/>
    <!-- Nähte nach außen -->
    <g stroke="#0B0E1F" stroke-width="2.4" stroke-linecap="round">
      <line x1="110" y1="139" x2="110" y2="116"/>
      <line x1="122.4" y1="148" x2="145" y2="140.5"/>
      <line x1="117.6" y1="162.5" x2="131.5" y2="181.5"/>
      <line x1="102.4" y1="162.5" x2="88.5" y2="181.5"/>
      <line x1="97.6" y1="148" x2="75" y2="140.5"/>
    </g>
    <!-- feiner Rand -->
    <circle cx="110" cy="152" r="37" fill="none" stroke="#0B0E1F" stroke-width="1.4" opacity="0.5"/>
  </g>
</svg>
